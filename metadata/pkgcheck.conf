[DEFAULT]
# PotentialStable: not useful in a personal overlay.
# NonsolvableDepsInDev: zeek/nodejs unresolvable in amd64/23.0/x32 dev profile;
#   requires a fix in Gentoo's x32 package.use.mask, not fixable from an overlay.
keywords = -PotentialStable,-NonsolvableDepsInDev
# Enable network URL checks.
net =
timeout = 30
